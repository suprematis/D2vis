      basicAuth:
        users:
          - "test:$apr1$H6uskkkW$Igjt6uSpt6Y0P3rX.0B97."

  services:
    api-service:
      loadBalancer:
        servers:
          - url: "http://10.0.1.50:8080"
          - url: "http://10.0.1.51:8080"

